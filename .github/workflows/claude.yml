name: Claude Code Assistant

# Issue / PR コメントで `@claude` をメンションすると Claude Code が起動して作業し PR を出す。
# `anthropics/claude-code-action` の内部で event 本文をパースするため command injection の懸念は無い。
# 認証は以下のいずれかを Repository Secret に設定して、対応する input に渡す：
# - Max サブスクの OAuth トークン → `claude_code_oauth_token:` input
# - API クレジット課金の API キー → `anthropic_api_key:` input
# 入力名を取り違えると Anthropic 側で `Invalid API key` 拒否されるため注意。

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # 公開リポでの API 消費悪用を防ぐため、owner のコメント・レビューにのみ反応
    if: github.repository_owner == github.actor
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 20

      - id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Open Draft PR for Claude branch
        # Claude Code Action が変更を push したら、その作業ブランチに対して
        # 自動で Draft PR を立てる。マージ判断は owner が行う前提。
        # branch_name は信頼値だが env 経由で渡し shell では引用展開する（command injection 防御）。
        if: success() && steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.claude.outputs.branch_name }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' || true)
          if [ -n "$existing" ]; then
            echo "PR already exists for $BRANCH (#$existing)"
            exit 0
          fi
          gh pr create --draft \
            --head "$BRANCH" \
            --base main \
            --fill
